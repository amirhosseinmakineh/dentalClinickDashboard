<main class="auth-page" aria-labelledby="login-title">
  <section class="auth-card mat-elevation-z3">
    <div class="auth-heading">
      <p class="eyebrow">خوش آمدید</p>
      <h1 id="login-title">ورود به داشبورد کلینیک دندان‌پزشکی</h1>
      <p>برای ادامه، شماره موبایل کلینیک و رمز عبور خود را وارد کنید.</p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field-group">
        <label for="userId">شناسه کاربر</label>
        <input
          id="userId"
          type="text"
          formControlName="userId"
          autocomplete="username"
          dir="ltr"
          placeholder="00000000-0000-0000-0000-000000000000"
        />
      </div>

      <div class="field-group">
        <label for="phoneNumber">شماره موبایل</label>
        <input
          id="phoneNumber"
          type="tel"
          formControlName="phoneNumber"
          inputmode="numeric"
          autocomplete="tel"
          placeholder="09123456789"
        />
      </div>

      <div class="field-group">
        <label for="password">رمز عبور</label>
        <input
          id="password"
          type="password"
          formControlName="passwordHash"
          autocomplete="current-password"
          placeholder="حداقل ۸ کاراکتر"
        />
      </div>

      <app-button type="submit" [disabled]="isSubmitting" [fullWidth]="true">
        {{ isSubmitting ? 'در حال ورود...' : 'ورود' }}
      </app-button>
    </form>

    <p class="switch-auth">
      حساب کاربری ندارید؟
      <a routerLink="/register">ثبت‌نام کنید</a>
    </p>
  </section>
</main>
