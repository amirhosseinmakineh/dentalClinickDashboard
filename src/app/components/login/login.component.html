<section class="auth-showcase" id="login" aria-labelledby="login-title" dir="rtl">
  <div class="section-shell auth-shell auth-shell--login">
    <div class="auth-card auth-card--compact">
      <div class="auth-card__header">
        <div class="auth-icon" aria-hidden="true">
          <span class="material-symbols-outlined">lock</span>
        </div>
        <p class="eyebrow">ورود امن</p>
        <h2 id="login-title">خوش آمدید</h2>
        <p>لطفاً برای دسترسی به پنل کاربری دل‌خند وارد شوید.</p>
      </div>

      <form class="auth-form" aria-label="فرم ورود" (ngSubmit)="submit()">
        <div class="form-field">
          <label for="login-identity">شماره همراه یا ایمیل</label>
          <div class="input-wrap input-wrap--ltr-value">
            <input id="login-identity" name="phoneNumber" type="text" placeholder="09123456789" autocomplete="username" [(ngModel)]="phoneNumber" />
            <span class="material-symbols-outlined" aria-hidden="true">person</span>
          </div>
        </div>

        <div class="form-field">
          <div class="label-row">
            <label for="login-password">رمز عبور</label>
            <a href="#register">فراموشی رمز؟</a>
          </div>
          <div class="input-wrap input-wrap--password">
            <input id="login-password" name="password" [type]="isPasswordVisible ? 'text' : 'password'" placeholder="••••••••" autocomplete="current-password" [(ngModel)]="passwordHash" />
            <span class="material-symbols-outlined" aria-hidden="true">lock</span>
            <button type="button" aria-label="نمایش رمز عبور" (click)="togglePasswordVisibility()">
              <span class="material-symbols-outlined" aria-hidden="true">visibility</span>
            </button>
          </div>
        </div>

        <div class="check-row">
          <input id="remember-me" type="checkbox" />
          <label for="remember-me">مرا به خاطر بسپار</label>
        </div>

        <button class="auth-submit" type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'در حال ورود...' : 'ورود به حساب کاربری' }}</button>
      </form>

      <p class="auth-switch">هنوز حساب کاربری ندارید؟ <a href="#register">ثبت‌نام کنید</a></p>
    </div>

    <div class="auth-visual auth-visual--login" aria-hidden="true">
      <img
        src="https://lh3.googleusercontent.com/aida-public/AB6AXuCtMX538IoglcaslZmjfguwiyX_9LcxtVb6fbBvFaaZ0WWWqVpRZai-tzZJdVgBeOSpUaTEd0mRnbYUoo2reokJdt3P1RpJXh9t0TtK49hFCHekvXrkAyuu64xn_9E5xkRfbpXP1iTOrnR7IJ7p40P152Wgz8Em3XpBMQpHB4fS621W01sG2gnyS6YQuNBSA1fKJSFnCJtbCt6ylPRAqeDL4_9FSn98rSRWWOqKvf0ul90_EqhNwXcJhTVZrFGrb1VRAIk-L9gqYg"
        alt="فضای آرام و مدرن کلینیک دندانپزشکی"
      />
      <div class="auth-floating-note">
        <span class="material-symbols-outlined">verified_user</span>
        <strong>ورود امن به پنل بیماران</strong>
      </div>
    </div>
  </div>
</section>
