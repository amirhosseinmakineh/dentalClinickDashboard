<main class="auth-page" aria-labelledby="register-title">
  <section class="auth-card mat-elevation-z3">
    <div class="auth-heading">
      <p class="eyebrow">ایجاد پروفایل</p>
      <h1 id="register-title">ثبت‌نام در داشبورد کلینیک دندان‌پزشکی</h1>
      <p>اطلاعات حساب خود را کامل کنید تا دسترسی مناسب برای داشبورد شما آماده شود.</p>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="form-grid">
        <div class="field-group">
          <label for="firstName">نام</label>
          <input id="firstName" type="text" formControlName="firstName" autocomplete="given-name" />
        </div>

        <div class="field-group">
          <label for="lastName">نام خانوادگی</label>
          <input id="lastName" type="text" formControlName="lastName" autocomplete="family-name" />
        </div>

        <div class="field-group">
          <label for="phoneNumber">شماره موبایل</label>
          <input
            id="phoneNumber"
            type="tel"
            formControlName="phoneNumber"
            inputmode="numeric"
            autocomplete="tel"
            placeholder="09123456789"
          />
        </div>

        <div class="field-group">
          <label for="password">رمز عبور</label>
          <input id="password" type="password" formControlName="password" autocomplete="new-password" />
        </div>

        <div class="field-group">
          <label for="gender">جنسیت</label>
          <select id="gender" formControlName="gender">
            @for (gender of genderOptions; track gender.value) {
              <option [value]="gender.value">{{ gender.label }}</option>
            }
          </select>
        </div>

        <div class="field-group">
          <label for="birthDate">تاریخ تولد</label>
          <input id="birthDate" type="date" formControlName="birthDate" [max]="today" />
        </div>
      </div>

      <app-button type="submit" [disabled]="isSubmitting" [fullWidth]="true">
        {{ isSubmitting ? 'در حال ایجاد حساب...' : 'ثبت‌نام' }}
      </app-button>
    </form>

    <p class="switch-auth">
      قبلاً حساب ساخته‌اید؟
      <a routerLink="/login">وارد شوید</a>
    </p>
  </section>
</main>
