<div class="dashboard-shell" [class.sidebar-collapsed]="!isSidebarOpen">
  <app-sidebar
    [items]="sidebarItems"
    [isOpen]="isSidebarOpen"
    [activeKey]="activeSidebarKey"
    (itemSelected)="selectSidebarItem($event)"
    (closeSidebar)="closeMobileSidebar()"
  />

  @if (isSidebarOpen) {
    <button class="mobile-backdrop" type="button" aria-label="Close menu" (click)="closeMobileSidebar()"></button>
  }

  <main class="dashboard-main">
    <app-dashboard-header (toggleSidebar)="toggleSidebar()" />

    <section class="starter-card" aria-label="Angular default starter">
      <span class="starter-badge">Angular 20</span>
      <h2>Default Angular starter</h2>
      <p>
        Business modules, guards, services, models, and feature pages were removed. This project now keeps only the
        reusable layout shell and installed packages so new Angular 20 code can be added from a clean baseline.
      </p>
    </section>
  </main>
</div>
