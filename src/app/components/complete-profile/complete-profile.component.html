<main class="complete-page" aria-labelledby="complete-profile-title">
  <section class="complete-card">
    <a class="back-link" [routerLink]="dashboardUrl">بازگشت به داشبورد</a>
    <div class="heading">
      <span>🦷</span>
      <p>فقط برای بیمار و مشاور</p>
      <h1 id="complete-profile-title">تکمیل پروفایل</h1>
      <small>این فرم فعلاً UI نمایشی است و درخواست جدیدی به بک‌اند ارسال نمی‌کند.</small>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <label>
        کد ملی
        <input type="text" formControlName="nationalCode" inputmode="numeric" placeholder="۱۰ رقم" />
      </label>
      <label>
        موبایل اضطراری
        <input type="tel" formControlName="emergencyPhone" inputmode="numeric" placeholder="09123456789" />
      </label>
      <label class="wide">
        نشانی
        <input type="text" formControlName="address" placeholder="نشانی محل سکونت یا محل کار" />
      </label>
      <label class="wide">
        توضیحات پزشکی
        <textarea formControlName="medicalNotes" rows="4" placeholder="حساسیت دارویی، بیماری زمینه‌ای یا توضیحات تکمیلی"></textarea>
      </label>
      <button type="submit">ثبت نمایشی پروفایل</button>
    </form>
  </section>
</main>
